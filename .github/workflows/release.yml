# Stable Release Workflow for PkgXtractor (C++/Qt)
# Triggers automatically on push/merge to the 'main' branch

name: CI Build and Release

on:
  push:
    branches:
      - main # Changed from tags to the main branch

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.10.2"
          arch: "win64_msvc2022_64"

      # --- Build Qt GUI version ---
      - name: Configure CMake (Qt GUI)
        run: >
          cmake -S . -B build-qt -G "Ninja Multi-Config" -DCMAKE_BUILD_TYPE=Release -DENABLE_QT_GUI=ON

      - name: Build Qt GUI (Release)
        run: >
          cmake --build build-qt --config Release --target pkgxtractor-qt

      - name: Deploy Qt DLLs
        run: windeployqt6 build-qt\Release\pkgxtractor-qt.exe

      # --- Build CLI version ---
      - name: Configure CMake (CLI)
        run: >
          cmake -S . -B build-cli -G "Ninja Multi-Config" -DCMAKE_BUILD_TYPE=Release -DENABLE_QT_GUI=OFF

      - name: Build CLI (Release)
        run: >
          cmake --build build-cli --config Release --target pkgxtractor-cli

      # --- Generate Auto-Tag from CMakeLists.txt ---
      - name: Generate Version Tag
        id: version_meta
        shell: pwsh
        run: |
          # 1. Read the entire CMakeLists.txt file
          $cmakeText = Get-Content -Path "CMakeLists.txt" -Raw
          
          # 2. Use a Regular Expression to find 'set(APP_VERSION "X.Y.Z")'
          if ($cmakeText -match 'set\(\s*APP_VERSION\s+"([^"]+)"\s*\)') {
              $baseVersion = $matches[1]
          } else {
              Write-Error "Could not find APP_VERSION in CMakeLists.txt"
              exit 1
          }

          # 3. Combine base version with GitHub run number (e.g., v0.12.0-b42)
          # Using '-b' to clearly separate your base version from the build number
          $tag = "v$baseVersion-b$env:GITHUB_RUN_NUMBER"
          
          # Print out for the logs so you can see it worked
          echo "Extracted Base Version: $baseVersion"
          echo "Generated Tag: $tag"
          
          # Pass the tag to the next steps
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      # --- Package and Release ---
      - name: Package Artifacts
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version_meta.outputs.tag }} # Pulls the tag generated above
        run: |
          $ErrorActionPreference = 'Stop'
          $root = "$env:GITHUB_WORKSPACE"
          
          $qtDir = Join-Path $root 'build-qt\Release'
          $cliDir = Join-Path $root 'build-cli\Release'
          $outDir = Join-Path $root "pkgxtractor-release"
          
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          
          # Qt GUI files
          Copy-Item "$qtDir\pkgxtractor-qt.exe" $outDir -Force
          Copy-Item "$qtDir\*.dll" $outDir -Force
          
          # CLI files
          Copy-Item "$cliDir\pkgxtractor-cli.exe" $outDir -Force
          
          # Common files
          Copy-Item "$root\README.md" $outDir -Force
          Copy-Item "$root\LICENSE*" $outDir -Force
          
          # Compress to ZIP using the new auto-tag
          $zip = "$root\PkgXtractor-$env:RELEASE_TAG.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zip -Force
          
          # Generate SHA256 hashes
          $hashQt = (Get-FileHash "$outDir\pkgxtractor-qt.exe" -Algorithm SHA256).Hash.ToUpper()
          $hashCli = (Get-FileHash "$outDir\pkgxtractor-cli.exe" -Algorithm SHA256).Hash.ToUpper()
          Set-Content -Path "$root\PkgXtractor-$env:RELEASE_TAG.sha256" -Value @(
            "$hashQt  pkgxtractor-qt.exe"
            "$hashCli  pkgxtractor-cli.exe"
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_meta.outputs.tag }}
          name: Release ${{ steps.version_meta.outputs.tag }}
          body: |
            Automated stable release.
            
            Download and extract the ZIP before running PkgXtractor.
            Verify the SHA256 checksum with the included .sha256 file.
          files: |
            PkgXtractor-*.zip
            PkgXtractor-*.sha256
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: PkgXtractor-*.zip
          