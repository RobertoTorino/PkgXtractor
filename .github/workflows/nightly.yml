name: Nightly / Beta Build

on:
  push:
    tags:
      - "test-v*" # Manual beta tags (e.g. test-v1.2.3)
    branches:
      - dev # Auto-nightly on every push to dev
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.10.2"
          arch: "win64_msvc2022_64"

      - name: Configure CMake
        run: >
          cmake -S . -B build -G "Ninja Multi-Config" -DCMAKE_BUILD_TYPE=Release -DENABLE_QT_GUI=ON

      - name: Build (Release)
        run: >
          cmake --build build --config Release --target PkgXtractor

      - name: Deploy Qt DLLs
        # Uses the system PATH set by the Qt Action and targets the Multi-Config Release folder
        run: windeployqt6 build\Release\PkgXtractor.exe

      - name: Package Artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = "$env:GITHUB_WORKSPACE"
          
          # Updated to target the Release subfolder where Ninja places the built exe
          $buildDir = Join-Path $root 'build\Release'
          $outDir = Join-Path $root "pkgxtractor-nightly"
          
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          
          Copy-Item "$buildDir\PkgXtractor.exe" $outDir -Force
          Copy-Item "$buildDir\*.dll" $outDir -Force
          Copy-Item "$root\README.md" $outDir -Force
          Copy-Item "$root\LICENSE*" $outDir -Force
          
          $zip = "$root\PkgXtractor-$env:GITHUB_RUN_NUMBER.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zip -Force
          
          $hash = (Get-FileHash "$outDir\PkgXtractor.exe" -Algorithm SHA256).Hash.ToUpper()
          Set-Content -Path "$root\PkgXtractor-$env:GITHUB_RUN_NUMBER.sha256" -Value "$hash  PkgXtractor.exe"

      - name: Set nightly tag and name
        id: nightly_meta
        shell: pwsh
        run: |
          if ("$env:GITHUB_REF_NAME" -eq "dev") {
            echo "tag=nightly-$env:GITHUB_RUN_NUMBER" >> $env:GITHUB_OUTPUT
            echo "name=Nightly #$env:GITHUB_RUN_NUMBER" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            echo "name=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.nightly_meta.outputs.tag }}
          name: ${{ steps.nightly_meta.outputs.name }}
          body: |
            **Beta / Nightly build** — use at your own risk.
            
            Download and extract the ZIP before running PkgXtractor.exe.
            Verify the SHA256 checksum with the included .sha256 file.
          files: |
            PkgXtractor-*.zip
            PkgXtractor-*.sha256
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: PkgXtractor-*.zip
