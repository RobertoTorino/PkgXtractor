# Nightly/Beta Build Workflow for PkgXtractor (C++/Qt)
# Triggers: push to dev, or tags like test-v*

name: Nightly / Beta Build

on:
  push:
    tags:
      - 'test-v*'   # Manual beta tags (e.g. test-v1.2.3)
    branches:
      - dev         # Auto-nightly on every push to dev
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.2'
          arch: 'win64_msvc2019_64'  # Adjust if using MSVC 2022 or Clang

      - name: Configure CMake
        run: >
          cmake -S . -B build -G "Ninja Multi-Config" -DCMAKE_BUILD_TYPE=Release -DENABLE_QT_GUI=ON

      - name: Build (Release)
        run: >
          cmake --build build --config Release --target PkgXtractor

      - name: Deploy Qt DLLs
        run: >
          C:\Qt\6.10.2\msvc2019_64\bin\windeployqt.exe build\PkgXtractor.exe

      - name: Package Artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = "$env:GITHUB_WORKSPACE"
          $buildDir = Join-Path $root 'build'
          $outDir = Join-Path $root "pkgxtractor-nightly"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Copy-Item "$buildDir\PkgXtractor.exe" $outDir -Force
          Copy-Item "$buildDir\*.dll" $outDir -Force
          Copy-Item "$root\README.md" $outDir -Force
          Copy-Item "$root\LICENSE*" $outDir -Force
          $zip = "$root\PkgXtractor-$env:GITHUB_RUN_NUMBER.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zip -Force
          $hash = (Get-FileHash "$outDir\PkgXtractor.exe" -Algorithm SHA256).Hash.ToUpper()
          Set-Content -Path "$root\PkgXtractor-$env:GITHUB_RUN_NUMBER.sha256" -Value "$hash  PkgXtractor.exe"

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'dev' && format('nightly-{0}', github.run_number) || github.ref_name }}
          name: ${{ github.ref_name == 'dev' && format('Nightly #{0}', github.run_number) || github.ref_name }}
          body: "**Beta / Nightly build** — use at your own risk.\n\nDownload and extract the ZIP before running PkgXtractor.exe.\nVerify the SHA256 checksum with the included .sha256 file."
          files: |
            PkgXtractor-*.zip
            PkgXtractor-*.sha256
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: PkgXtractor-*.zip
